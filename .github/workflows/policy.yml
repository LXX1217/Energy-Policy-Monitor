name: 政策抓取与推送

on:
  schedule:
    # 北京时间每天早上8点执行（UTC 0点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests beautifulsoup4
      - name: 运行脚本
        env:
          WECHAT_KEY: ${{ secrets.WECHAT_KEY }}
        run: python fetch_policy.py
